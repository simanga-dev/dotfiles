#  Uncomment to enable // change to a preferred value
# рҹ”— See https://wiki.hyprland.org/Configuring/Variables/#input
input {
    # kb_layout = us
    # follow_mouse = 1
    # sensitivity = 0
    # force_no_accel = 0
    # accel_profile = flat
    # numlock_by_default = true

    # рҹ”— See https://wiki.hyprland.org/Configuring/Variables/#touchpad
    touchpad {
        natural_scroll = no
    }

}

general {
    layout = master
}



# рҹ”— See https://wiki .hyprland.org/Configuring/Variables/#gestures
gestures {
#     workspace_swipe = true
#     workspace_swipe_fingers = 3
}

execr-once = mpd

monitor=,preferred,auto,1
monitor=HDMI-A-1,2560x1440@120.00Hz,auto,1

# bindl=,switch:on:Lid Switch,exec,hyprctl keyword monitor "eDP-1, disable"
bind = ,f6, exec, hyprctl keyword monitor "eDP-1, disable"
bind = $mainMod,f6, exec, hyprctl keyword monitor "eDP-1, enable"




windowrule = float on, match:class ^(zen-beta)$, match:title ^(Picture-in-Picture)$
windowrule = pin on, match:class ^(zen-beta)$, match:title ^(Picture-in-Picture)$
windowrule = no_initial_focus on, match:class ^(zen-beta)$, match:title ^(Picture-in-Picture)$
windowrule = move 2000 856, match:class ^(zen-beta)$, match:title ^(Picture-in-Picture)$
windowrule = size 489 275, match:class ^(zen-beta)$, match:title ^(Picture-in-Picture)$

windowrule =float on, match:class ^(zen)$, match:title ^(Picture-in-Picture)$
windowrule = pin on, match:class ^(zen)$, match:title ^(Picture-in-Picture)$

windowrule = float on, match:class ^(localsend)$
windowrule = pin on, match:class ^(localsend)$
windowrule = size 488 1001, match:class ^(localsend)$

