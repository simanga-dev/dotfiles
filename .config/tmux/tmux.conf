# unbind-key -a

set -g prefix ^a

set -g base-index 1              # start indexing windows at 1 instead of 0
# set -g detach-on-destroy off     # don't exit from tmux when closing a session
# set -g escape-time 0             # zero-out escape time delay
set -g history-limit 1000000     # increase history size (from 2,000)
set -g renumber-windows on       # renumber all windows when any window is closed
set -g set-clipboard on          # use system clipboard
set-window-option -g automatic-rename off
# set -g status-position top       # macOS / darwin style
# set -g default-terminal "${TERM}"
set escape-time 10
set-option -sg escape-time 10

set-option -g status-style bg=default
set-option -g status-style fg=green
set-option -g focus-events on
set-window-option -g window-status-current-style fg=blue


bind-key i popup -E "/home/simanga/.local/bin/snippy.sh"
# bind-key o popup -E "/home/simanga/.local/bin/quickmove.sh"

bind-key "o" popup -E  -w 80% -h 70% -E  'set -eu; \
  result=$( \
    sesh list --icons | fzf \
      --no-sort --ansi --border-label " sesh " --prompt "⚡  " \
      --header "  ^a all ^t tmux ^g git ^r configs ^x zoxide ^b worktree ^d tmux kill ^f find" \
      --expect=ctrl-b \
      --bind "tab:down,btab:up" \
      --bind "ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)" \
      --bind "ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)" \
      --bind "ctrl-g:change-prompt(   )+reload(list-git-repos.sh)" \
      --bind "ctrl-r:change-prompt(⚙️  )+reload(sesh list -c --icons)" \
      --bind "ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)" \
      --bind "ctrl-f:change-prompt(🔀  )+reload(fd -H -d 2 -t d -E .Trash . ~)" \
      --bind "ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)" \
      --preview-window "right:55%" \
      --preview "sesh preview {}" \
  ) || exit 0; \
  key=$(printf "%s\n" "$result" | sed -n "1p"); \
  selected=$(printf "%s\n" "$result" | sed -n "2p"); \
  [ -n "$selected" ] || exit 0; \
  if [ "$key" = "ctrl-b" ]; then \
    exec "$HOME/.local/bin/open-worktree.sh" "$selected"; \
  fi; \
  clean=$(printf "%s" "$selected" | sed "s/\x1b\[[0-9;]*m//g" | awk "{print \$2}"); \
  clean=$(printf "%s" "$clean" | sed "s|^~|$HOME|"); \
  exec sesh connect -c "nvim ." "$clean"'


bind-key r popup -E "runscript"

bind-key p popup -E "fzf-pass -f -c"
bind-key e popup -E "nnn -c"

bind-key a popup -E "clx"

bind-key C popup -E "nchat" 

bind-key C popup -E  -w 80% -h 70% -E "nchat" 

# bind-key Escape popup -E "btop"

bind-key V popup -E "clipse"

bind-key m popup  -E "mpd & rmpc"

bind-key n run-shell "notestaker.sh"

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

#ss bind-key o run-shell "#{@scrPath}/quickmove.sh >/dev/null 2>&1"

bind -N "last-session (via sesh) " BTab run-shell "sesh last"

bind tab last-window

bind Enter new-window
bind q kill-window
bind Q kill-session

bind s split-window -v
bind v split-window -h

bind ^d detach


set-option -a terminal-features 'xterm-256color:RGB'
set-option -a terminal-overrides 'xterm-256color:Tc'

set -g pane-border-style fg='#565f89'
set -g popup-border-style fg='#565f89'

set -ga terminal-overrides ',*256color*:smcup@:rmcup@'


set -g @plugin 'niksingh710/minimal-tmux-status'

# set -g status-right '#(gitmux "#{pane_current_path}")'
set -g @minimal-tmux-status-right-extra '#(gitmux "#{pane_current_path}")'
set -g @minimal-tmux-justify "centre"
# set -g @minimal-tmux-indicator-str "show time"
set -g @minimal-tmux-right false
set -g @minimal-tmux-left false
set -g @minimal-tmux-status-left-extra "%H:%M "

set -g status off
set -g @minimal-tmux-fg "#0d1117"
bind-key b set-option status

run '~/.tmux/plugins/tpm/tpm'
